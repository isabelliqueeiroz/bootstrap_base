<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Bootstrap</title>

    <!-- CSS do Bottstrap via  CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS personalizado -->
     <link rel="stylesheet" href="style.css">
</head>
<body>


    <!-- 1ª Digitação (Aqui) -->
     <div class="container">
        <div class="row my-3">
            <div class="col-sm-3 bg-primary">Coluna1</div>
            <div class="col-sm-3 bg-secondary">Coluna2</div>
            <div class="col-sm-3 bg-primary">Coluna1</div>
            <div class="col-sm-3 bg-secondary">Coluna2</div>
        </div>


        <div class="row my-3">
            <div class="col-sm-4 bg-secondary">Coluna1</div>
            <div class="col-sm-4 bg-primary">Coluna2</div>
            <div class="col-sm-4 bg-secondary">Coluna2</div>
        </div>
     

        <div class="row mb-4">
            <div class="col-sm-6 bg-primary">Coluna1</div>
            <div class="col-sm-6  fw-bold bg-secondary">Coluna2</div>
        </div>

        <!-- Linha com colunas diferentes -->
        <div class="row mb-3">

              <!--Primeira coluna da linha -->
            <div class="bg-warning col-md-7 mb-4">
                <h2>Título</h2>
                <p>Texto responsivo</p>
            </div>
            <!-- Segunda coluna da linha -->
            <div class="bg-danger col-md-6">
                <img src="https://placehold.co/200x100" alt="Imagem">
            </div>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
