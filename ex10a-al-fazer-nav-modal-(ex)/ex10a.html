<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Modal com Formulário</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand">Meu Site</span>
  <button class="btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#contatoModal">
    Contato
  </button>
</nav>

<!-- Modal -->
<div class="modal fade" id="contatoModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      
      <div class="modal-header">
        <h5 class="modal-title">Formulário de Contato</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form class="needs-validation" novalidate>

          <!-- Nome -->
          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" required>
            <div class="invalid-feedback">
              Por favor, insira seu nome.
            </div>
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" class="form-control" required>
            <div class="invalid-feedback">
              Insira um e-mail válido.
            </div>
          </div>

          <!-- Mensagem -->
          <div class="mb-3">
            <label class="form-label">Mensagem</label>
            <textarea class="form-control" rows="3" required></textarea>
            <div class="invalid-feedback">
              Escreva uma mensagem.
            </div>
          </div>

          <button class="btn btn-primary" type="submit">Enviar</button>
        </form>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS + Validação -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
(() => {
  'use strict';
  const forms = document.querySelectorAll('.needs-validation');

  Array.from(forms).forEach(form => {
    form.addEventListener('submit', event => {
      if (!form.checkValidity()) {
        event.preventDefault();
        event.stopPropagation();
      }
      form.classList.add('was-validated');
    }, false);
  });
})();
</script>

</body>
</html>
