 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Bootstrap Customizado</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
</head>
<body>


    <!-- 1ª Digitação (Aqui) -->
     <div class="container mt-3">
        <form class="custom-form">
            <div class="col-sm-6 mb-3 bi-envelope">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control custom-input" id="email">
            </div>


            <div class="col-sm-6 mb-3 bi-lock">
                <label for="senha" class="form-label">Senha</label>
                <input type="password" class="form-control custom-input mb-3" id="senha">
            </div>

            <button type="submit" class="btn btn-primary custom-button mb-3 bi-arrow-right"> Enviar</button>
        </form>
     </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
